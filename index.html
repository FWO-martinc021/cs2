<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CS2 Map Simulator</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 10px;
    background: #1a1a1a;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    background: #333;
    color: white;
    border-radius: 6px;
  }

  button:hover {
    background: #555;
  }

  #map {
    flex: 1;
    position: relative;
    background: #222;
    overflow: hidden;
  }

  /* simple visual difference per map */
  .ancient { background: #2d3b2f; }
  .anubis { background: #2b2f3b; }
  .dust2 { background: #3b352b; }
  .mirage { background: #3b2f2f; }
  .inferno { background: #3b2a2a; }
  .overpass { background: #2a3b3b; }
  .nuke { background: #2f2f3b; }

  .player {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    position: absolute;
    cursor: grab;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .t {
    background: yellow;
  }

  .ct {
    background: dodgerblue;
  }

  .label {
    position: absolute;
    top: 5px;
    left: 10px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<header>
  <button onclick="setMap('ancient')">Ancient</button>
  <button onclick="setMap('anubis')">Anubis</button>
  <button onclick="setMap('dust2')">Dust II</button>
  <button onclick="setMap('mirage')">Mirage</button>
  <button onclick="setMap('inferno')">Inferno</button>
  <button onclick="setMap('overpass')">Overpass</button>
  <button onclick="setMap('nuke')">Nuke</button>
</header>

<div id="map" class="mirage">
  <div class="label" id="mapLabel">Mirage</div>
</div>

<script>
const map = document.getElementById("map");
const label = document.getElementById("mapLabel");

const maps = {
  ancient: "Ancient",
  anubis: "Anubis",
  dust2: "Dust II",
  mirage: "Mirage",
  inferno: "Inferno",
  overpass: "Overpass",
  nuke: "Nuke"
};

function setMap(name) {
  map.className = name;
  label.textContent = maps[name];
}

/* create 10 players */
const players = [];

function createPlayer(type, x, y) {
  const el = document.createElement("div");
  el.classList.add("player", type);
  el.style.left = x + "px";
  el.style.top = y + "px";

  map.appendChild(el);

  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", (e) => {
    dragging = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
    el.style.cursor = "grabbing";
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    let x = e.clientX - offsetX;
    let y = e.clientY - offsetY;

    // keep inside map
    const rect = map.getBoundingClientRect();
    x = Math.max(0, Math.min(rect.width - 22, x));
    y = Math.max(0, Math.min(rect.height - 22, y));

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
    el.style.cursor = "grab";
  });

  players.push(el);
}

/* spawn CTs */
for (let i = 0; i < 5; i++) {
  createPlayer("ct", 50 + i * 30, 80);
}

/* spawn Ts */
for (let i = 0; i < 5; i++) {
  createPlayer("t", 50 + i * 30, 200);
}
</script>

</body>
</html>
