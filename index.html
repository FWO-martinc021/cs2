<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>CS2 Map Simulator</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

header {
  padding: 10px;
  display: flex;
  gap: 8px;
  background: #1c1c1c;
  flex-wrap: wrap;
}

button {
  padding: 8px;
  border: 0;
  background: #333;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

#map {
  position: relative;
  height: calc(100vh - 60px);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.player {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  position: absolute;
  cursor: grab;
}

.t { background: yellow; }
.ct { background: dodgerblue; }
</style>
</head>

<body>

<header>
  <button onclick="setMap('ancient')">Ancient</button>
  <button onclick="setMap('anubis')">Anubis</button>
  <button onclick="setMap('dust2')">Dust II</button>
  <button onclick="setMap('mirage')">Mirage</button>
  <button onclick="setMap('inferno')">Inferno</button>
  <button onclick="setMap('overpass')">Overpass</button>
  <button onclick="setMap('nuke')">Nuke</button>
</header>

<div id="map"></div>

<script>
const map = document.getElementById("map");

const maps = {
  ancient: "maps/ancient.webp",
  anubis: "maps/anubis.webp",
  dust2: "maps/dust2.webp",
  mirage: "maps/mirage.webp",
  inferno: "maps/inferno.webp",
  overpass: "maps/overpass.webp",
  nuke: "maps/nuke.webp"
};

function setMap(name) {
  map.style.backgroundImage = `url('${maps[name]}')`;
}

/* draggable player system */
function createPlayer(type, x, y) {
  const el = document.createElement("div");
  el.className = `player ${type}`;
  el.style.left = x + "px";
  el.style.top = y + "px";
  map.appendChild(el);

  let drag = false;
  let ox = 0, oy = 0;

  el.addEventListener("mousedown", (e) => {
    drag = true;
    ox = e.clientX - el.offsetLeft;
    oy = e.clientY - el.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (!drag) return;

    const rect = map.getBoundingClientRect();

    let x = e.clientX - rect.left - ox;
    let y = e.clientY - rect.top - oy;

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  document.addEventListener("mouseup", () => drag = false);
}

/* 5 CT */
for (let i = 0; i < 5; i++) {
  createPlayer("ct", 60 + i * 25, 80);
}

/* 5 T */
for (let i = 0; i < 5; i++) {
  createPlayer("t", 60 + i * 25, 200);
}

/* default map */
setMap("mirage");
</script>

</body>
</html>
